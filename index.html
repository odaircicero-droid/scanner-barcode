<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Pro v4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: #00f2ff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; text-align: center; }
        .header { padding: 15px; font-family: 'Orbitron', sans-serif; font-size: 1.2rem; }
        #scanner-container { width: 92%; height: 250px; margin: 0 auto; border: 2px solid #00f2ff; border-radius: 15px; position: relative; background: #000; overflow: hidden; }
        #scanner-container video { width: 100%; height: 100%; object-fit: cover; }
        .laser { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: #ff0000; box-shadow: 0 0 12px #ff0000; z-index: 10; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        button { background: rgba(0, 242, 255, 0.1); border: 1px solid #00f2ff; color: #00f2ff; padding: 15px; border-radius: 10px; font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer; }
        #btn-save { border-color: #7000ff; color: #7000ff; }
        .list-container { width: 92%; margin: 0 auto; background: #111; border-radius: 10px; border: 1px solid #333; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; color: #fff; font-size: 0.9rem; }
        th { background: #1a1a1a; color: #00f2ff; padding: 12px; border-bottom: 2px solid #00f2ff; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #222; text-align: left; }
    </style>
</head>
<body>
    <div class="header">GOIS ESQUADRIAS | SCAN</div>
    
    <div id="scanner-container">
        <div class="laser"></div>
    </div>

    <div class="btns">
        <button onclick="ativarCamera()">LIGAR SCANNER</button>
        <button id="btn-save" onclick="salvarPlanilha()">BAIXAR EXCEL</button>
    </div>

    <div class="list-container">
        <table id="tabela-dados">
            <thead>
                <tr>
                    <th>CÓDIGO</th>
                    <th>HORA</th>
                </tr>
            </thead>
            <tbody id="corpo-tabela">
                </tbody>
        </table>
    </div>

    <script>
        let gravando = false;

        function ativarCamera() {
            if(gravando) return;
            
            Quagga.init({
                inputStream: { 
                    name: "Live", 
                    type: "LiveStream", 
                    target: document.querySelector('#scanner-container'),
                    constraints: { facingMode: "environment", focusMode: "continuous" }
                },
                decoder: { 
                    readers: ["ean_reader", "code_128_reader", "code_39_reader"] 
                }
            }, (err) => {
                if (err) return alert("Erro: " + err);
                Quagga.start();
                gravando = true;
            });

            Quagga.onDetected((res) => {
                const code = res.codeResult.code;
                processarLeitura(code);
            });
        }

        function processarLeitura(code) {
            const corpo = document.getElementById('corpo-tabela');
            const agora = new Date().toLocaleTimeString();

            // Evita ler o mesmo código repetidamente em menos de 2 segundos
            const ultimaLinha = corpo.firstChild;
            if (ultimaLinha && ultimaLinha.dataset.code === code) return;

            // Adiciona na tabela visual
            const tr = document.createElement('tr');
            tr.dataset.code = code;
            tr.innerHTML = `<td>${code}</td><td>${agora}</td>`;
            corpo.insertBefore(tr, corpo.firstChild);

            // Feedback
            if(navigator.vibrate) navigator.vibrate(80);
            const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3');
            audio.play();
        }

        function salvarPlanilha() {
            const tabela = document.getElementById('tabela-dados');
            
            // Verifica se tem dados além do cabeçalho
            if (document.getElementById('corpo-tabela').rows.length === 0) {
                alert("A tabela está vazia! Escaneie algo primeiro.");
                return;
            }

            // Converte a TABELA HTML diretamente para Excel (Mais seguro)
            const wb = XLSX.utils.table_to_book(tabela, { sheet: "Leituras" });
            
            // Gera o arquivo e força o download
            XLSX.writeFile(wb, "Relatorio_Barcodes.xlsx");
        }
    </script>
</body>
</html>
