<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Gois</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        .header { padding: 15px; font-family: 'Orbitron', sans-serif; color: #00f2ff; }
        #scanner-container { width: 90%; height: 280px; margin: 0 auto; border: 2px solid #00f2ff; border-radius: 15px; position: relative; background: #000; overflow: hidden; }
        #scanner-container video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Moldura de foco mais discreta */
        .viewport { position: absolute; top: 0; left: 0; width: 100%; height: 100%; box-shadow: inset 0 0 100px rgba(0,242,255,0.2); }

        .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        button { background: #111; border: 1px solid #00f2ff; color: #00f2ff; padding: 15px; border-radius: 10px; font-family: 'Orbitron'; font-size: 0.7rem; }
        #btn-save { border-color: #7000ff; color: #7000ff; }
        
        .list-container { width: 90%; margin: 0 auto; background: #111; border-radius: 10px; max-height: 250px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { color: #00f2ff; padding: 10px; border-bottom: 2px solid #00f2ff; font-size: 0.8rem; }
        td { padding: 10px; border-bottom: 1px solid #222; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="header">GOIS ESQUADRIAS</div>
    
    <div id="scanner-container">
        <div class="viewport"></div>
    </div>

    <div class="btns">
        <button onclick="ligar()">LIGAR CÂMERA</button>
        <button id="btn-save" onclick="salvar()">BAIXAR EXCEL</button>
    </div>

    <div class="list-container">
        <table id="minha-tabela">
            <thead><tr><th>CÓDIGO</th><th>HORA</th></tr></thead>
            <tbody id="corpo"></tbody>
        </table>
    </div>

    <script>
        function ligar() {
            Quagga.init({
                inputStream: { 
                    name: "Live", 
                    type: "LiveStream", 
                    target: document.querySelector('#scanner-container'),
                    constraints: { facingMode: "environment" }
                },
                decoder: { 
                    readers: ["ean_reader", "code_128_reader", "code_39_reader", "upc_reader"],
                    multiple: false 
                },
                locate: true // Ajuda a encontrar o código na imagem
            }, (err) => {
                if (err) return alert("Erro: " + err);
                Quagga.start();
            });

            Quagga.onDetected((data) => {
                const code = data.codeResult.code;
                registrar(code);
            });
        }

        let ultimoSaco = "";
        let ultimaVez = 0;

        function registrar(code) {
            const agora = Date.now();
            if (code === ultimoSaco && (agora - ultimaVez < 3000)) return;

            ultimoSaco = code;
            ultimaVez = agora;

            const corpo = document.getElementById('corpo');
            const row = corpo.insertRow(0);
            row.insertCell(0).innerHTML = code;
            row.insertCell(1).innerHTML = new Date().toLocaleTimeString();

            // Feedback
            if(navigator.vibrate) navigator.vibrate(100);
            new Audio('https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3').play().catch(()=>{});
        }

        function salvar() {
            const tab = document.getElementById('minha-tabela');
            if (document.getElementById('corpo').rows.length === 0) {
                return alert("Nada para salvar!");
            }
            const wb = XLSX.utils.table_to_book(tab);
            XLSX.writeFile(wb, "Relatorio_Gois.xlsx");
        }
    </script>
</body>
</html>
