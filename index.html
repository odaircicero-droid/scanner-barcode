<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Gois Profissional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background: #000; color: #00f2ff; font-family: sans-serif; margin: 0; text-align: center; overflow-x: hidden; }
        #camera { width: 100%; height: 300px; background: #111; border-bottom: 2px solid #00f2ff; position: relative; }
        #camera video { width: 100%; height: 100%; object-fit: cover; }
        .controls { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 18px; border-radius: 8px; border: 1px solid #00f2ff; background: rgba(0,242,255,0.1); color: #00f2ff; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        button:active { background: #00f2ff; color: #000; }
        .table-container { padding: 10px; background: #0a0a0a; min-height: 200px; }
        table { width: 100%; border-collapse: collapse; color: #fff; }
        th { border-bottom: 2px solid #00f2ff; padding: 10px; color: #00f2ff; }
        td { padding: 12px; border-bottom: 1px solid #222; font-family: monospace; font-size: 16px; }
    </style>
</head>
<body>

    <div id="camera"></div>

    <div class="controls">
        <button onclick="ligar()">Ligar Câmera</button>
        <button onclick="baixar()" style="border-color:#a200ff; color:#a200ff;">Baixar Excel</button>
    </div>

    <div class="table-container">
        <table id="tabela-final">
            <thead><tr><th>CÓDIGO</th><th>HORA</th></tr></thead>
            <tbody id="lista"></tbody>
        </table>
    </div>

    <script>
        function ligar() {
            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector('#camera'),
                    constraints: {
                        facingMode: "environment",
                        aspectRatio: { min: 1, max: 2 }
                    },
                },
                locator: { patchSize: "medium", halfSample: true },
                decoder: { 
                    readers: ["ean_reader", "code_128_reader", "code_39_reader", "upc_reader"] 
                },
                locate: true
            }, function(err) {
                if (err) return alert("Erro: " + err);
                Quagga.start();
            });

            Quagga.onDetected(function(res) {
                const code = res.codeResult.code;
                registrar(code);
            });
        }

        let bloqueio = false;
        function registrar(code) {
            if (bloqueio) return;
            bloqueio = true;

            const lista = document.getElementById('lista');
            const row = lista.insertRow(0);
            row.insertCell(0).innerHTML = code;
            row.insertCell(1).innerHTML = new Date().toLocaleTimeString();

            if (navigator.vibrate) navigator.vibrate(100);
            new Audio('https://www.soundjay.com/button/beep-07.wav').play().catch(()=>{});

            // Espera 2 segundos para permitir a próxima leitura
            setTimeout(() => { bloqueio = false; }, 2000);
        }

        function baixar() {
            const table = document.getElementById('tabela-final');
            if (document.getElementById('lista').rows.length === 0) return alert("Nada lido!");
            const wb = XLSX.utils.table_to_book(table);
            XLSX.writeFile(wb, "Relatorio_Gois_Final.xlsx");
        }
    </script>
</body>
</html>
