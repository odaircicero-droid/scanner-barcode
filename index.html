<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Pro | Gois Esquadrias</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --purple: #7000ff; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        .header { padding: 20px; font-family: 'Orbitron', sans-serif; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        
        /* Container da Câmera */
        #camera { 
            width: 92%; height: 280px; margin: 0 auto; 
            border: 2px solid var(--neon); border-radius: 15px; 
            position: relative; background: #000; overflow: hidden; 
        }
        #camera video { width: 100%; height: 100%; object-fit: cover; }

        /* Linha de Leitura Animada */
        .scanner-line { 
            position: absolute; top: 0; left: 0; width: 100%; height: 3px; 
            background: var(--neon); box-shadow: 0 0 15px var(--neon);
            animation: scan 2.5s infinite linear; z-index: 10;
        }
        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        /* Botões */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        button { 
            padding: 15px; border-radius: 10px; border: 1px solid var(--neon); 
            background: rgba(0, 242, 255, 0.05); color: var(--neon); 
            font-family: 'Orbitron', sans-serif; font-size: 0.7rem; cursor: pointer;
        }
        #btn-excel { border-color: var(--purple); color: var(--purple); }
        button:active { background: var(--neon); color: #000; }

        /* Tabela */
        .table-container { width: 92%; margin: 0 auto; background: #111; border-radius: 10px; max-height: 250px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { color: var(--neon); padding: 12px; border-bottom: 2px solid var(--neon); font-size: 0.8rem; }
        td { padding: 12px; border-bottom: 1px solid #222; font-size: 1rem; font-family: monospace; }
    </style>
</head>
<body>

    <div class="header">GOIS SCANNER PRO</div>
    
    <div id="camera">
        <div class="scanner-line"></div>
    </div>

    <div class="controls">
        <button onclick="ligar()">LIGAR CÂMERA</button>
        <button id="btn-excel" onclick="baixar()">SALVAR EXCEL</button>
    </div>

    <div class="table-container">
        <table id="tabela-main">
            <thead><tr><th>CÓDIGO</th><th>HORA</th></tr></thead>
            <tbody id="corpo"></tbody>
        </table>
    </div>

    <script>
        function ligar() {
            Quagga.init({
                inputStream: { 
                    name: "Live", type: "LiveStream", 
                    target: document.querySelector('#camera'),
                    constraints: { facingMode: "environment" }
                },
                decoder: { readers: ["ean_reader", "code_128_reader"] },
                locate: true
            }, (err) => {
                if (err) return alert("Erro: " + err);
                Quagga.start();
            });

            Quagga.onDetected((data) => {
                const code = data.codeResult.code;
                registrar(code);
            });
        }

        let ultimo = "";
        let timing = 0;

        function registrar(code) {
            const agora = Date.now();
            // Evita ler o mesmo código em menos de 3 segundos
            if (code === ultimo && (agora - timing < 3000)) return;

            ultimo = code;
            timing = agora;

            // Adiciona na tabela
            const corpo = document.getElementById('corpo');
            const row = corpo.insertRow(0);
            row.insertCell(0).innerText = code;
            row.insertCell(1).innerText = new Date().toLocaleTimeString();

            // --- FEEDBACKS ---
            // 1. Som de Bip
            const bip = new Audio('https://www.soundjay.com/button/beep-07.wav');
            bip.play().catch(e => console.log("Erro som:", e));

            // 2. Vibração (se o celular suportar)
            if (navigator.vibrate) navigator.vibrate(100);
        }

        function baixar() {
            const tab = document.getElementById('tabela-main');
            if (document.getElementById('corpo').rows.length === 0) return alert("Vazio!");
            const wb = XLSX.utils.table_to_book(tab);
            XLSX.writeFile(wb, "Relatorio_Gois_Captura.xlsx");
        }
    </script>
</body>
</html>
