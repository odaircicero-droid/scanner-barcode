<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Pro | Enterprise</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #050505;
            --card-bg: rgba(20, 20, 20, 0.8);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            padding: 2rem;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(to bottom, rgba(0, 242, 255, 0.1), transparent);
            width: 100%;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        #scanner-container {
            position: relative;
            width: 90%;
            max-width: 500px;
            height: 300px;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--primary);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            margin-bottom: 20px;
        }

        #scanner-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Linha de scan animada */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            animation: moveScan 2s infinite linear;
            z-index: 10;
        }

        @keyframes moveScan {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
        }

        button:hover {
            background: var(--primary);
            color: var(--bg);
            box-shadow: 0 0 20px var(--primary);
        }

        .data-table-container {
            width: 90%;
            max-width: 600px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            color: var(--primary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
        }

        .status {
            font-size: 0.8rem;
            color: #888;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Barcode Scanner System</h1>
    </div>

    <div id="scanner-container">
        <div class="scan-line"></div>
    </div>

    <div class="controls">
        <button onclick="startScanner()">Iniciar Câmera</button>
        <button onclick="exportToExcel()" style="border-color: var(--secondary); color: var(--secondary);">Exportar Planilha</button>
    </div>

    <div class="data-table-container">
        <table>
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Data/Hora</th>
                </tr>
            </thead>
            <tbody id="result-list">
                </tbody>
        </table>
        <div id="status" class="status">Aguardando comando...</div>
    </div>

    <script>
        let scannedData = [];

        function startScanner() {
            document.getElementById('status').innerText = "Câmera ativa. Aponte para o código.";
            
            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector('#scanner-container'),
                    constraints: {
                        facingMode: "environment" // Usa a câmera traseira
                    },
                },
                decoder: {
                    readers: ["code_128_reader", "ean_reader", "ean_8_reader", "code_39_reader"]
                }
            }, function(err) {
                if (err) {
                    console.log(err);
                    return;
                }
                Quagga.start();
            });

            Quagga.onDetected(function(data) {
                const code = data.codeResult.code;
                const timestamp = new Date().toLocaleString();
                
                // Evita duplicatas imediatas
                if (scannedData.length === 0 || scannedData[0].code !== code) {
                    addResult(code, timestamp);
                    
                    // Feedback visual e sonoro (opcional)
                    navigator.vibrate(100); 
                }
            });
        }

        function addResult(code, time) {
            scannedData.unshift({ code: code, time: time });
            
            const tableBody = document.getElementById('result-list');
            const row = `<tr>
                <td style="color: #00f2ff; font-weight: bold;">${code}</td>
                <td>${time}</td>
            </tr>`;
            
            tableBody.innerHTML = row + tableBody.innerHTML;
        }

        function exportToExcel() {
            if (scannedData.length === 0) {
                alert("Nenhum dado capturado!");
                return;
            }

            const worksheet = XLSX.utils.json_to_sheet(scannedData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Capturas");
            
            // Gera o download do arquivo
            XLSX.writeFile(workbook, "relatorio_codigos.xlsx");
        }
    </script>
</body>
</html>
