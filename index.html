<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Gois v5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background: #000; color: #00f2ff; font-family: Arial, sans-serif; margin: 0; padding: 10px; text-align: center; }
        #canvas-camera { width: 100%; height: 250px; border: 2px solid #00f2ff; border-radius: 10px; overflow: hidden; background: #111; }
        #canvas-camera video { width: 100%; height: 100%; object-fit: cover; }
        .controls { display: flex; gap: 10px; margin: 15px 0; }
        button { flex: 1; padding: 15px; border-radius: 5px; border: 1px solid #00f2ff; background: #000; color: #00f2ff; font-weight: bold; cursor: pointer; }
        #btn-save { border-color: #a200ff; color: #a200ff; }
        .table-area { background: #111; border-radius: 5px; margin-top: 10px; max-height: 200px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; color: #fff; font-size: 14px; }
        th, td { padding: 10px; border-bottom: 1px solid #333; text-align: center; }
    </style>
</head>
<body>

    <h3>GOIS ESQUADRIAS - SCAN</h3>
    
    <div id="canvas-camera"></div>

    <div class="controls">
        <button onclick="iniciar()">LIGAR</button>
        <button id="btn-save" onclick="baixar()">SALVAR EXCEL</button>
    </div>

    <div class="table-area">
        <table id="tabela-main">
            <thead>
                <tr><th>CÓDIGO</th><th>HORA</th></tr>
            </thead>
            <tbody id="lista-corpo"></tbody>
        </table>
    </div>

    <script>
        function iniciar() {
            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector('#canvas-camera'),
                    constraints: { facingMode: "environment" }
                },
                decoder: {
                    readers: ["code_128_reader", "ean_reader"]
                },
                locate: true
            }, function(err) {
                if (err) return alert("Erro: " + err);
                Quagga.start();
            });

            Quagga.onDetected(function(result) {
                var code = result.codeResult.code;
                adicionar(code);
            });
        }

        var ultimo = "";
        function adicionar(code) {
            if (code === ultimo) return; 
            ultimo = code;

            var corpo = document.getElementById('lista-corpo');
            var row = corpo.insertRow(0);
            row.insertCell(0).innerHTML = code;
            row.insertCell(1).innerHTML = new Date().toLocaleTimeString();

            // Beep e Vibração
            if (navigator.vibrate) navigator.vibrate(100);
            new Audio('https://www.soundjay.com/button/beep-07.wav').play();
            
            // Pequena pausa para não ler o mesmo código 100 vezes
            setTimeout(() => { ultimo = ""; }, 2000);
        }

        function baixar() {
            var tab = document.getElementById('tabela-main');
            if (tab.rows.length <= 1) return alert("Escaneie algo primeiro!");
            
            var wb = XLSX.utils.table_to_book(tab);
            XLSX.writeFile(wb, "Relatorio_Scanner.xlsx");
        }
    </script>
</body>
</html>
