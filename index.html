<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Gois | Laser Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --laser: #ff0000; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        .header { padding: 15px; font-family: 'Orbitron', sans-serif; color: var(--neon); text-shadow: 0 0 8px var(--neon); font-size: 1.1rem; }
        
        #camera { 
            width: 92%; height: 280px; margin: 0 auto; 
            border: 2px solid #333; border-radius: 15px; 
            position: relative; background: #000; overflow: hidden; 
        }
        #camera video { width: 100%; height: 100%; object-fit: cover; }

        /* Linha Laser Vermelha */
        .laser-line { 
            position: absolute; top: 50%; left: 0; width: 100%; height: 2px; 
            background: var(--laser); box-shadow: 0 0 12px var(--laser);
            z-index: 10; animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; }
        button { 
            padding: 15px; border-radius: 10px; border: 1px solid var(--neon); 
            background: rgba(0, 242, 255, 0.05); color: var(--neon); 
            font-family: 'Orbitron', sans-serif; font-size: 0.7rem; font-weight: bold;
        }
        #btn-excel { border-color: #a200ff; color: #a200ff; }
        button:active { background: white; color: black; }

        .table-container { width: 92%; margin: 0 auto; background: #111; border-radius: 10px; max-height: 250px; overflow-y: auto; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { color: var(--neon); padding: 10px; border-bottom: 2px solid #333; font-size: 0.8rem; position: sticky; top: 0; background: #111; }
        td { padding: 12px; border-bottom: 1px solid #222; font-family: monospace; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="header">GOIS ESQUADRIAS SCAN</div>
    
    <div id="camera">
        <div class="laser-line"></div>
    </div>

    <div class="controls">
        <button onclick="ligarScanner()">LIGAR CÂMERA</button>
        <button id="btn-excel" onclick="baixar()">SALVAR EXCEL</button>
    </div>

    <div class="table-container">
        <table id="tabela-main">
            <thead><tr><th>CÓDIGO</th><th>HORA</th></tr></thead>
            <tbody id="corpo"></tbody>
        </table>
    </div>

    <audio id="audio-bip" preload="auto">
        <source src="https://www.soundjay.com/button/beep-07.wav" type="audio/wav">
    </audio>

    <script>
        const somBip = document.getElementById('audio-bip');
        let ultimo = "";
        let timing = 0;

        function ligarScanner() {
            // Tocar o som mudo uma vez para "desbloquear" o áudio no celular
            somBip.play().then(() => {
                somBip.pause();
                somBip.currentTime = 0;
            }).catch(() => { console.log("Áudio aguardando interação"); });

            Quagga.init({
                inputStream: { 
                    name: "Live", type: "LiveStream", 
                    target: document.querySelector('#camera'),
                    constraints: { facingMode: "environment" }
                },
                decoder: { readers: ["ean_reader", "code_128_reader", "code_39_reader"] },
                locate: true
            }, (err) => {
                if (err) return alert("Erro: " + err);
                Quagga.start();
            });

            Quagga.onDetected((data) => {
                registrar(data.codeResult.code);
            });
        }

        function registrar(code) {
            const agora = Date.now();
            if (code === ultimo && (agora - timing < 3000)) return;

            ultimo = code;
            timing = agora;

            const corpo = document.getElementById('corpo');
            const row = corpo.insertRow(0);
            row.insertCell(0).innerText = code;
            row.insertCell(1).innerText = new Date().toLocaleTimeString();

            // Feedback sonoro
            somBip.currentTime = 0;
            somBip.play();

            // Feedback de vibração
            if (navigator.vibrate) navigator.vibrate(100);
        }

        function baixar() {
            const tab = document.getElementById('tabela-main');
            if (document.getElementById('corpo').rows.length === 0) return alert("Nenhum dado capturado!");
            const wb = XLSX.utils.table_to_book(tab);
            XLSX.writeFile(wb, "Relatorio_Gois_Producao.xlsx");
        }
    </script>
</body>
</html>
